name: proxybase-gui Release

on:
  push:
    tags:
      - "proxybase-gui-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundles
        run: pnpm tauri build -- --locked

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find src-tauri/target/release/bundle -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' -o \
            -name '*.tar.gz' \
          \) -exec cp {} dist/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bundles-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -type f ! -name SHA256SUMS.txt -exec sha256sum {} + | sort > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
